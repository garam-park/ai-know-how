services:
  postgres:
    image: postgres:15-alpine
    container_name: public-it-test-db
    environment:
      POSTGRES_DB: public_it_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testuser -d public_it_test']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: public-it-test-backend
    environment:
      DATABASE_URL: postgresql://testuser:testpassword@postgres:5432/public_it_test
      JWT_SECRET: test-secret-key
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      BACKEND_PORT: 3001
      CORS_ORIGIN: http://localhost:3003
      NODE_ENV: test
    ports:
      - '3002:3001' # 내부 앱은 3001에 뜨지만 호스트 3002 매핑
    depends_on:
      postgres:
        condition: service_healthy
    # 테스트 전용 백엔드는 실행 될 때마다 reset/seed를 수행
    command: >
      sh -c "npx prisma migrate reset --force --skip-generate && npx prisma db seed && node dist/main.js"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # 빌드 타임에 테스트 백엔드를 바라보도록 상대 경로 사용 (Nginx Proxy 활용)
        - VITE_API_URL=/api/v1
    container_name: public-it-test-frontend
    environment:
      VITE_API_URL: /api/v1
    ports:
      - '3003:80'
    depends_on:
      - backend
