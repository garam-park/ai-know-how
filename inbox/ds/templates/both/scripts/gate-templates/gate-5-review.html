<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gate 5: Evolve Review — {{PROJECT_NAME}}</title>
<style>{{SHARED_CSS}}</style>
</head>
<body>

<header class="review-header">
  <h1>Gate 5: Evolve Review</h1>
  <p>거버넌스 · 채택률 · Health Check 검토</p>
  <div class="review-meta">
    <span class="badge badge-attempt">Attempt {{ATTEMPT}} / 3</span>
    <span class="badge badge-date">{{DATE}}</span>
    <span>프로젝트: {{PROJECT_NAME}}</span>
  </div>
  <div class="version-nav">{{VERSION_NAV}}</div>
</header>

<!-- 검증 항목 -->
<section class="review-section">
  <h2>Gate 5 검증 항목</h2>
  <table class="review-table">
    <thead><tr><th>항목</th><th>기준</th><th>상태</th></tr></thead>
    <tbody>
      <tr><td>채택률</td><td>70% 이상</td><td>—</td></tr>
      <tr><td>P0/P1 이슈</td><td>0건</td><td>—</td></tr>
      <tr><td>버전 편차</td><td>0 (전 프로젝트 최신 Major)</td><td>—</td></tr>
    </tbody>
  </table>
</section>

<!-- 채택률 게이지 -->
<section class="review-section">
  <h2>채택률</h2>
  <div id="adoption-gauge"></div>
  <div id="adoption-breakdown" class="bar-chart" style="margin-top:1rem"></div>
</section>

<!-- Health Check 카드 -->
<section class="review-section">
  <h2>Health Check</h2>
  <div id="health-cards" class="traffic-cards"></div>
</section>

<!-- RFC 현황 -->
<section class="review-section">
  <h2>RFC 현황</h2>
  <div id="rfc-board"></div>
</section>

<!-- 버전 현황 -->
<section class="review-section">
  <h2>프로젝트별 버전 현황</h2>
  <div id="version-table"></div>
</section>

<script>
const DATA = {{GATE_DATA_JSON}};
</script>

<script>
// 채택률 게이지
function renderAdoption() {
  const el = document.getElementById('adoption-gauge');
  const rate = DATA.adoptionRate || 0;
  const target = 70;
  const color = rate >= target ? '#2e7d32' : rate >= 50 ? '#f57f17' : '#c62828';

  el.innerHTML = `
    <div style="text-align:center">
      <div style="position:relative;width:200px;height:120px;margin:0 auto">
        <svg viewBox="0 0 200 120" width="200" height="120">
          <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#f5f5f5" stroke-width="16" stroke-linecap="round"/>
          <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="${color}" stroke-width="16" stroke-linecap="round"
            stroke-dasharray="${rate / 100 * 251.2} 251.2"/>
          <line x1="${20 + (target/100)*160}" y1="92" x2="${20 + (target/100)*160}" y2="108" stroke="#c62828" stroke-width="2"/>
        </svg>
        <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:2rem;font-weight:700;color:${color}">${rate}%</div>
      </div>
      <p style="color:#757575;font-size:0.8125rem;margin-top:0.5rem">목표: ${target}%</p>
    </div>`;

  // 팀별 breakdown
  const breakdown = DATA.adoptionByTeam || {};
  const brkEl = document.getElementById('adoption-breakdown');
  const entries = Object.entries(breakdown);
  if (!entries.length) return;

  const maxVal = 100;
  brkEl.innerHTML = '<h3>팀별 채택률</h3>' + entries.map(([team, pct]) => {
    const barColor = pct >= target ? '#2e7d32' : pct >= 50 ? '#f57f17' : '#c62828';
    return `<div class="bar-row">
      <span class="bar-label">${team}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor}">${pct}%</div></div>
    </div>`;
  }).join('');
}

// Health Check 카드
function renderHealth() {
  const el = document.getElementById('health-cards');
  const h = DATA.health || {};
  const cards = [
    { label: 'P0 이슈', count: h.p0 || 0, cls: (h.p0 || 0) === 0 ? 'traffic-green' : 'traffic-red' },
    { label: 'P1 이슈', count: h.p1 || 0, cls: (h.p1 || 0) === 0 ? 'traffic-green' : 'traffic-red' },
    { label: '버전 편차', count: h.versionDrift || 0, cls: (h.versionDrift || 0) === 0 ? 'traffic-green' : 'traffic-yellow' },
    { label: '기여 팀 수', count: h.contributingTeams || 0, cls: 'traffic-green' },
  ];
  el.innerHTML = cards.map(c =>
    `<div class="traffic-card ${c.cls}"><div class="count">${c.count}</div><div class="label">${c.label}</div></div>`
  ).join('');
}

// RFC 보드
function renderRfc() {
  const el = document.getElementById('rfc-board');
  const rfcs = DATA.rfcs || [];
  if (!rfcs.length) { el.innerHTML = '<p style="color:#757575">RFC 데이터 없음</p>'; return; }

  const statusColor = { approved: '#2e7d32', pending: '#f57f17', rejected: '#c62828', draft: '#757575' };
  let html = '<table class="review-table"><thead><tr><th>RFC</th><th>제목</th><th>상태</th><th>제출일</th></tr></thead><tbody>';
  rfcs.forEach(r => {
    const color = statusColor[r.status] || '#757575';
    html += `<tr><td>${r.id||''}</td><td>${r.title||''}</td><td style="color:${color};font-weight:700">${r.status||''}</td><td>${r.date||''}</td></tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

// 버전 현황
function renderVersions() {
  const el = document.getElementById('version-table');
  const versions = DATA.versions || [];
  if (!versions.length) { el.innerHTML = '<p style="color:#757575">버전 데이터 없음</p>'; return; }

  let html = '<table class="review-table"><thead><tr><th>프로젝트</th><th>현재 버전</th><th>최신 버전</th><th>상태</th></tr></thead><tbody>';
  versions.forEach(v => {
    const upToDate = v.current === v.latest;
    html += `<tr><td>${v.project||''}</td><td>${v.current||''}</td><td>${v.latest||''}</td>
      <td style="color:${upToDate ? '#2e7d32' : '#c62828'};font-weight:700">${upToDate ? '최신' : '업데이트 필요'}</td></tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

renderAdoption();
renderHealth();
renderRfc();
renderVersions();
</script>
</body>
</html>
