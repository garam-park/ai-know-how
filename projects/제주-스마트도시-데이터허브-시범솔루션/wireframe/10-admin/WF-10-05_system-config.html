<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시스템 설정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
  <link rel="stylesheet" href="../common/tokens.css">
  <link rel="stylesheet" href="../common/layout.css">
  <link rel="stylesheet" href="../common/components.css">
</head>
<body>
  <div id="app-shell">
    <nav id="gnb">
      <a href="#" class="gnb-logo">
        <div class="gnb-logo-icon">J</div>
        <span>제주 스마트도시 데이터허브</span>
      </a>
      <div class="gnb-menus"></div>
      <div class="gnb-actions">
        <div class="gnb-notification">
          <i data-lucide="bell" style="width: 20px; height: 20px;"></i>
          <span class="notification-badge">3</span>
        </div>
        <div class="gnb-user">
          <div class="user-avatar">K</div>
          <div class="user-info">
            <div class="user-name">김수현</div>
            <div class="user-role">관리자</div>
          </div>
          <i data-lucide="chevron-down" style="width: 16px; height: 16px;"></i>
        </div>
      </div>
    </nav>

    <div class="layout-container">
      <aside id="lnb">
        <ul class="lnb-menu-list"></ul>
        <button class="lnb-toggle-btn" title="LNB 토글">
          <i data-lucide="chevron-left"></i>
        </button>
      </aside>

      <main id="content">
        <div class="page-header">
          <h1 class="page-title">시스템 설정</h1>
          <p class="page-subtitle">시스템 운영 및 보안 설정 관리</p>
        </div>

        <div class="page-content">
          <!-- 아코디언 섹션들 -->
          <div class="accordion" id="systemSettings">
            <!-- 섹션 1: 일반 설정 -->
            <div class="accordion-item">
              <div class="accordion-header" onclick="this.classList.toggle('active')">
                <div class="accordion-title">일반 설정</div>
                <i class="accordion-icon" data-lucide="chevron-down" style="width: 20px; height: 20px;"></i>
              </div>
              <div class="accordion-content">
                <div style="padding: var(--spacing-lg);">
                  <div class="form-group">
                    <label class="form-label">시스템명</label>
                    <input type="text" class="form-input system-config-input" data-validation="required" value="제주 스마트도시 데이터허브">
                    <span class="error-message" style="display: none; color: var(--color-danger); font-size: var(--font-body-sm); margin-top: 4px;"></span>
                  </div>

                  <div class="form-group">
                    <label class="form-label">로고</label>
                    <div style="border: 2px dashed var(--border-color); padding: var(--spacing-lg); border-radius: var(--radius-lg); text-align: center; cursor: pointer;">
                      <i data-lucide="image" style="width: 32px; height: 32px; opacity: 0.3; margin: 0 auto var(--spacing-md); display: block;"></i>
                      <p style="font-size: var(--font-body-sm); color: var(--text-color-secondary);">로고 이미지를 선택하세요</p>
                    </div>
                  </div>

                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
                    <div class="form-group">
                      <label class="form-label">기본 언어</label>
                      <select class="form-select">
                        <option selected>한국어</option>
                        <option>English</option>
                        <option>中文</option>
                      </select>
                    </div>

                    <div class="form-group">
                      <label class="form-label">타임존</label>
                      <select class="form-select">
                        <option selected>Asia/Seoul</option>
                        <option>UTC</option>
                      </select>
                    </div>
                  </div>

                  <button class="btn btn-primary" onclick="validateAndSaveGeneralConfig()">저장</button>
                </div>
              </div>
            </div>

            <!-- 섹션 2: 보안 설정 -->
            <div class="accordion-item">
              <div class="accordion-header" onclick="this.classList.toggle('active')">
                <div class="accordion-title">보안 설정</div>
                <i class="accordion-icon" data-lucide="chevron-down" style="width: 20px; height: 20px;"></i>
              </div>
              <div class="accordion-content">
                <div style="padding: var(--spacing-lg);">
                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
                    <div class="form-group">
                      <label class="form-label">세션 타임아웃 (분)</label>
                      <input type="number" class="form-input system-config-input" data-validation="range" data-min="5" data-max="480" value="30">
                      <span class="error-message" style="display: none; color: var(--color-danger); font-size: var(--font-body-sm); margin-top: 4px;"></span>
                    </div>

                    <div class="form-group">
                      <label class="form-label">비밀번호 변경 주기 (일)</label>
                      <input type="number" class="form-input system-config-input" data-validation="range" data-min="30" data-max="365" value="90">
                      <span class="error-message" style="display: none; color: var(--color-danger); font-size: var(--font-body-sm); margin-top: 4px;"></span>
                    </div>
                  </div>

                  <div class="form-group">
                    <label class="form-label">비밀번호 정책</label>
                    <div style="display: flex; flex-direction: column; gap: var(--spacing-md);">
                      <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                        <input type="checkbox" checked>
                        <span style="font-size: var(--font-body-md);">최소 8자</span>
                      </label>
                      <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                        <input type="checkbox" checked>
                        <span style="font-size: var(--font-body-md);">대문자 포함</span>
                      </label>
                      <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                        <input type="checkbox" checked>
                        <span style="font-size: var(--font-body-md);">숫자 포함</span>
                      </label>
                      <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                        <input type="checkbox" checked>
                        <span style="font-size: var(--font-body-md);">특수문자 포함</span>
                      </label>
                    </div>
                  </div>

                  <div class="form-group">
                    <label class="form-label">2FA (이중 인증)</label>
                    <select class="form-select">
                      <option selected>활성화 (이메일)</option>
                      <option>활성화 (SMS)</option>
                      <option>활성화 (인증앱)</option>
                      <option>비활성화</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label class="form-label">IP 화이트리스트</label>
                    <textarea class="form-textarea system-config-input" data-validation="iplist" style="min-height: 80px;">192.168.1.0/24
203.0.113.0/24</textarea>
                    <span class="error-message" style="display: none; color: var(--color-danger); font-size: var(--font-body-sm); margin-top: 4px;"></span>
                  </div>

                  <button class="btn btn-primary" onclick="validateAndSaveSecurityConfig()">저장</button>
                </div>
              </div>
            </div>

            <!-- 섹션 3: 백업 설정 -->
            <div class="accordion-item">
              <div class="accordion-header" onclick="this.classList.toggle('active')">
                <div class="accordion-title">백업 설정</div>
                <i class="accordion-icon" data-lucide="chevron-down" style="width: 20px; height: 20px;"></i>
              </div>
              <div class="accordion-content">
                <div style="padding: var(--spacing-lg);">
                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
                    <div class="form-group">
                      <label class="form-label">자동 백업 주기</label>
                      <select class="form-select">
                        <option selected>매일</option>
                        <option>주 1회</option>
                        <option>월 1회</option>
                      </select>
                    </div>

                    <div class="form-group">
                      <label class="form-label">자동 백업 시간</label>
                      <input type="time" class="form-input" value="02:00">
                    </div>

                    <div class="form-group">
                      <label class="form-label">마지막 백업</label>
                      <input type="text" class="form-input" value="2026-03-25 02:15 (성공)" readonly style="background-color: var(--color-gray-100);">
                    </div>

                    <div class="form-group">
                      <label class="form-label">백업 보관 기간 (일)</label>
                      <input type="number" class="form-input system-config-input" data-validation="range" data-min="30" data-max="9999" value="90">
                      <span class="error-message" style="display: none; color: var(--color-danger); font-size: var(--font-body-sm); margin-top: 4px;"></span>
                    </div>
                  </div>

                  <button class="btn btn-primary" onclick="alert('지금 백업이 시작되었습니다')">
                    <i data-lucide="download" style="width: 16px; height: 16px;"></i>
                    지금 백업
                  </button>
                  <button class="btn btn-primary" style="margin-left: var(--spacing-md);" onclick="validateAndSaveBackupConfig()">저장</button>
                </div>
              </div>
            </div>

            <!-- 섹션 4: 라이선스 설정 -->
            <div class="accordion-item">
              <div class="accordion-header" onclick="this.classList.toggle('active')">
                <div class="accordion-title">라이선스 설정</div>
                <i class="accordion-icon" data-lucide="chevron-down" style="width: 20px; height: 20px;"></i>
              </div>
              <div class="accordion-content">
                <div style="padding: var(--spacing-lg);">
                  <div class="form-group">
                    <label class="form-label">라이선스 키</label>
                    <input type="text" class="form-input" value="JKMS-2026-XXXXX-XXXXX-XXXXX" readonly style="background-color: var(--color-gray-100);">
                  </div>

                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
                    <div class="form-group">
                      <label class="form-label">라이선스 상태</label>
                      <div style="padding: var(--spacing-md); background-color: var(--color-gray-100); border-radius: var(--radius-md); display: flex; align-items: center; gap: var(--spacing-sm);">
                        <span style="color: var(--color-success); font-weight: var(--font-weight-bold);">✓</span>
                        <span style="color: var(--color-success);">유효</span>
                      </div>
                    </div>

                    <div class="form-group">
                      <label class="form-label">만료일</label>
                      <input type="date" class="form-input" value="2026-12-31" readonly style="background-color: var(--color-gray-100);">
                    </div>
                  </div>

                  <div class="form-group">
                    <label class="form-label">사용 모듈</label>
                    <div style="display: flex; flex-direction: column; gap: var(--spacing-md);">
                      <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                        <input type="checkbox" checked disabled>
                        <span style="font-size: var(--font-body-md);">데이터 수집</span>
                      </label>
                      <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                        <input type="checkbox" checked disabled>
                        <span style="font-size: var(--font-body-md);">데이터 카탈로그</span>
                      </label>
                      <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                        <input type="checkbox" checked disabled>
                        <span style="font-size: var(--font-body-md);">보고서 생성</span>
                      </label>
                      <label style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
                        <input type="checkbox" checked disabled>
                        <span style="font-size: var(--font-body-md);">시스템 관리</span>
                      </label>
                    </div>
                  </div>

                  <div style="background-color: var(--color-gray-50); padding: var(--spacing-lg); border-radius: var(--radius-lg); margin: var(--spacing-lg) 0;">
                    <p style="font-size: var(--font-body-sm); color: var(--text-color-secondary); margin-bottom: var(--spacing-sm);">사용자 라이선스</p>
                    <p style="font-size: var(--font-heading-sm); color: var(--text-color);">100 사용자 <span style="font-size: var(--font-body-md);">(사용중: 45 / 남은용량: 55)</span></p>
                  </div>

                  <button class="btn btn-primary" onclick="alert('라이선스 연장 요청이 접수되었습니다')">라이선스 연장 요청</button>
                </div>
              </div>
            </div>

            <!-- 섹션 5: 테마 설정 -->
            <div class="accordion-item">
              <div class="accordion-header" onclick="this.classList.toggle('active')">
                <div class="accordion-title">테마 설정</div>
                <i class="accordion-icon" data-lucide="chevron-down" style="width: 20px; height: 20px;"></i>
              </div>
              <div class="accordion-content">
                <div style="padding: var(--spacing-lg);">
                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
                    <div class="form-group">
                      <label class="form-label">다크모드</label>
                      <select class="form-select">
                        <option>밝은 테마</option>
                        <option>어두운 테마</option>
                        <option selected>시스템 설정 따름</option>
                      </select>
                    </div>

                    <div class="form-group">
                      <label class="form-label">테마 프리셋</label>
                      <select class="form-select">
                        <option selected>Default</option>
                        <option>Green</option>
                        <option>Blue</option>
                        <option>Purple</option>
                      </select>
                    </div>

                    <div class="form-group">
                      <label class="form-label">주색상</label>
                      <input type="color" class="form-input" value="#0066FF" style="height: auto; padding: 8px;">
                    </div>

                    <div class="form-group">
                      <label class="form-label">강조색</label>
                      <input type="color" class="form-input" value="#FF6B35" style="height: auto; padding: 8px;">
                    </div>
                  </div>

                  <button class="btn btn-primary" onclick="validateAndSaveThemeConfig()">저장</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../common/nav-data.js"></script>
  <script src="../common/components.js"></script>
  <script>
    /**
     * 설정값 유효성 검사 및 저장 (일반 설정)
     */
    function validateAndSaveGeneralConfig() {
      if (validateConfigInputs()) {
        showToast('일반 설정이 저장되었습니다', 'success');
      }
    }

    /**
     * 설정값 유효성 검사 및 저장 (보안 설정)
     */
    function validateAndSaveSecurityConfig() {
      if (validateConfigInputs()) {
        showToast('보안 설정이 저장되었습니다', 'success');
      }
    }

    /**
     * 설정값 유효성 검사 및 저장 (백업 설정)
     */
    function validateAndSaveBackupConfig() {
      if (validateConfigInputs()) {
        showToast('백업 설정이 저장되었습니다', 'success');
      }
    }

    /**
     * 설정값 유효성 검사 및 저장 (테마 설정)
     */
    function validateAndSaveThemeConfig() {
      showToast('테마 설정이 저장되었습니다', 'success');
    }

    /**
     * 전체 설정값 유효성 검사
     * @returns {boolean} 검사 결과
     */
    function validateConfigInputs() {
      const inputs = document.querySelectorAll('.system-config-input');
      let isValid = true;

      inputs.forEach(input => {
        const validation = input.dataset.validation;
        const errorSpan = input.parentElement.querySelector('.error-message');
        let errorMessage = '';

        if (validation === 'required') {
          if (!input.value || input.value.trim() === '') {
            errorMessage = '필수 항목입니다';
            isValid = false;
          }
        } else if (validation === 'range') {
          const value = parseFloat(input.value);
          const min = parseFloat(input.dataset.min);
          const max = parseFloat(input.dataset.max);

          if (isNaN(value)) {
            errorMessage = '숫자를 입력해주세요';
            isValid = false;
          } else if (value < min || value > max) {
            errorMessage = `${min} ~ ${max} 범위내 값을 입력해주세요`;
            isValid = false;
          }
        } else if (validation === 'iplist') {
          const lines = input.value.trim().split('\n');
          const ipRegex = /^(\d{1,3}\.){3}\d{1,3}(\/\d{1,2})?$/;

          for (let line of lines) {
            line = line.trim();
            if (line && !ipRegex.test(line)) {
              errorMessage = '올바른 IP 주소 형식이 아닙니다';
              isValid = false;
              break;
            }
          }
        }

        if (errorMessage) {
          if (errorSpan) {
            errorSpan.textContent = errorMessage;
            errorSpan.style.display = 'block';
          }
          input.style.borderColor = 'var(--color-danger)';
        } else {
          if (errorSpan) {
            errorSpan.style.display = 'none';
          }
          input.style.borderColor = '';
        }
      });

      if (!isValid) {
        showToast('입력값을 확인해주세요', 'error');
      }

      return isValid;
    }

    // 첫 번째 아코디언 열기
    document.addEventListener('DOMContentLoaded', () => {
      const firstHeader = document.querySelector('.accordion-header');
      if (firstHeader) {
        firstHeader.classList.add('active');
      }
    });

    window.addEventListener('load', () => {
      initLayout('admin');
      lucide.createIcons();
    });
  </script>
</body>
</html>
