version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: public-it-db
    environment:
      POSTGRES_DB: public_it
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d public_it']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: public-it-backend
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/public_it
      JWT_SECRET: production-secret-change-me
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      BACKEND_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/main.js"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: public-it-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  pgdata:
