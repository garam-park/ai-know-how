version: '3.8'

services:
  test-db:
    image: postgres:15-alpine
    container_name: public-it-test-db
    environment:
      POSTGRES_DB: public_it_test
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d public_it_test']
      interval: 5s
      timeout: 5s
      retries: 5

  test-backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: public-it-test-backend
    environment:
      DATABASE_URL: postgresql://user:password@test-db:5432/public_it_test
      JWT_SECRET: test-secret
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      BACKEND_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: test
    ports:
      - '3001:3001'
    depends_on:
      test-db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate reset --force && node dist/main.js"

  # Frontend tests will usually run locally against localhost:3000 running frontend app targeting localhost:3001
